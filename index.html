<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Aashi Shah</title>

        <style>
            body {
                font-family: Inter, sans-serif;
                background: #faf8f5;
                color: #2E1B00;
                max-width: 700px;
                margin: auto;
                padding: 40px 20px;
            }
            .header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
            }
            .contact {
                text-align: right;
            }

            a {
                color: #4a3b2a;
                text-decoration: none;
                font-weight: 400;
                transition: 0.15s ease;
            }

            a:hover {
                color: #2E1B00;
                text-decoration: underline;
            }

            a:active {
                transform: scale(0.98);
            }

            a:visited {
                color: #6b5a48;
            }

            /* Icons hidden on desktop */
            .mobile-icon {
                display: none;
            }

            @media (max-width: 600px) {
                body {
                    padding: 28px 20px;
                    font-size: 16px;
                }

                .header {
                    flex-direction: column;
                    gap: 24px;
                }

                h1 {
                    font-size: 2rem;
                }

                p {
                    font-size: 1rem;
                    line-height: 1.7;
                }

                .contact {
                    text-align: left;
                    width: 100%;
                }

                .contact p {
                    font-size: 1rem;
                }

                /* Collapse spacing between Website and Download Resume */
                .header-info p {
                    margin-top: 0;
                    margin-bottom: 0;
                }

                /* Icon rows layout */
                .icon-row {
                    display: flex;
                    align-items: center;
                    gap: 10px;
                    padding: 6px 0;
                }

                .mobile-icon {
                    display: inline-flex;
                    align-items: center;
                    flex-shrink: 0;
                    opacity: 0.55;
                    width: 18px;
                    height: 18px;
                }

                .mobile-icon svg {
                    width: 18px;
                    height: 18px;
                }

                /* Contact rows */
                .contact-rows {
                    display: flex;
                    flex-direction: column;
                    gap: 2px;
                }

                .contact-rows .icon-row {
                    padding: 4px 0;
                }
            }

            /* Headshot — hidden on desktop */
            .headshot {
                display: none;
            }

            @media (max-width: 600px) {
                .mobile-header-top {
                    display: flex;
                    align-items: center;
                    gap: 16px;
                    margin-bottom: 12px;
                }

                .headshot {
                    display: block;
                    width: 72px;
                    height: 72px;
                    border-radius: 50%;
                    object-fit: cover;
                    object-position: center top;
                    flex-shrink: 0;
                    border: 2px solid #d8d0c8;
                }

                .mobile-name-block h1 {
                    font-size: 1.5rem;
                    margin: 0 0 2px 0;
                }

                .mobile-name-block p {
                    margin: 0;
                    font-size: 0.9rem;
                }
            }
        </style>
    </head>
