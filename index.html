        <style>
            body {
                font-family: Inter, sans-serif;
                background: #faf8f5;
                color: #2E1B00;
                max-width: 700px;
                margin: auto;
                padding: 40px 20px;
            }
            .header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
            }
            .contact {
                text-align: right;
            }

            a {
                color: #4a3b2a;
                text-decoration: none;
                font-weight: 400;
                transition: 0.15s ease;
            }

            a:hover {
                color: #2E1B00;
                text-decoration: underline;
            }

            a:active {
                transform: scale(0.98);
            }

            a:visited {
                color: #6b5a48;
            }

            @media (max-width: 600px) {
                body {
                    padding: 28px 20px;
                    font-size: 16px;
                }

                .header {
                    flex-direction: column;
                    gap: 24px;
                }

                h1 {
                    font-size: 2rem;
                }

                p {
                    font-size: 1rem;
                    line-height: 1.7;
                }

                .contact {
                    text-align: left;
                    width: 100%;
                }

                .contact p {
                    font-size: 1rem;
                }

                /* Bigger tap targets for links in contact block */
                .contact i a {
                    display: inline-block;
                    padding: 4px 0;
                    min-height: 40px;
                    line-height: 40px;
                }

                /* Links inside body paragraphs stay inline */
                .header-info i a {
                    display: inline-block;
                    padding: 4px 0;
                    min-height: 40px;
                    line-height: 40px;
                }
            }
        </style>
